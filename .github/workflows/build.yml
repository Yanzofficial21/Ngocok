    runs-on: ubuntu-latest
    steps:
      - name: 🥷 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Reconstruction & Rezx Injection
        run: |
          rm -rf app build.gradle settings.gradle gradlew output_apk
          mkdir -p app/src/main/java/com/infinity/app
          mkdir -p app/src/main/res/layout app/src/main/res/values

          # INJECT JANTUNG REZX V1 (AUTO-FIX)
          printf "package com.infinity.app;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.widget.TextView;\nimport android.graphics.Color;\nimport android.widget.ScrollView;\npublic class MainActivity extends Activity {\n@Override\nprotected void onCreate(Bundle s){\nsuper.onCreate(s);\nScrollView sv = new ScrollView(this);\nTextView tv = new TextView(this);\ntv.setBackgroundColor(Color.BLACK);\ntv.setTextColor(Color.GREEN);\ntv.setPadding(40,40,40,40);\ntv.setText(\"𓁹____𓁹\\\\nselamat datang di REZX\\\\nV1\\\\n𓁹____𓁹\\\\n\\\\n.INFO (Rezx AI)\\\\n.OWNER (Rezi)\\\\n.SOSMED (rzzz_555)\\\\n\\\\nSTATUS: BERHASIL DICETAK!\\\\nCOBA CEK TAB ARTIFACTS!\");\nsv.addView(tv);\nsetContentView(sv);\n}\n}" > app/src/main/java/com/infinity/app/MainActivity.java

          # REPARASI FILE ACAK (Kalo lu naruh file lain)
          find . -name "*.java" -not -path "./app/*" -exec cp {} app/src/main/java/com/infinity/app/ \;
          for file in app/src/main/java/com/infinity/app/*.java; do
            sed -i '/package /d' "$file"
            sed -i '1i package com.infinity.app;' "$file"
          done

          # GRADLE SYSTEM (KEBAL ERROR)
          echo "include ':app'" > settings.gradle
          printf "buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }\n}\nallprojects { repositories { google(); mavenCentral() } }\n" > build.gradle
          printf "apply plugin: 'com.android.application'\nandroid {\n  namespace 'com.infinity.app'\n  compileSdk 34\n  defaultConfig {\n    applicationId 'com.infinity.app'\n    minSdk 21\n    targetSdk 34\n  }\n}\n" > app/build.gradle
          printf "<manifest xmlns:android='http://schemas.android.com/apk/res/android' package='com.infinity.app'>\n<application android:label='RezxV17'>\n<activity android:name='.MainActivity' android:exported='true'>\n<intent-filter>\n<action android:name='android.intent.action.MAIN' />\n<category android:name='android.intent.category.LAUNCHER' />\n</intent-filter>\n</activity>\n</application>\n</manifest>" > app/src/main/AndroidManifest.xml

      - name: 🚀 Build APK Paksa
        run: |
          sudo apt-get update && sudo apt-get install gradle -y
          gradle assembleDebug --no-daemon

      - name: 🚚 Pindahin APK (JALUR KHUSUS)
        run: |
          mkdir -p final_output
          # Paksa cari di folder build dan pindahin ke folder final_output
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} ./final_output/app-debug.apk \;
          ls -l ./final_output/

      - name: 📦 Kirim APK Rezx (FIXED PATH)
        uses: actions/upload-artifact@v4
        with:
          name: HASIL_REZX_V17
          path: final_output/app-debug.apk
          if-no-files-found: error
