name: INFINITY_V8_FINAL_OMEGA
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🥷 Ambil Kode (Checkout)
        uses: actions/checkout@v4

      - name: ☕ Siapin Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Operasi Plastik Kode (FORCED RECONSTRUCTION)
        run: |
          # 1. RESET TOTAL & BERSIHIN SAMPAH
          rm -rf app build.gradle settings.gradle
          mkdir -p app/src/main/java/com/infinity/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 2. KUMPULIN SEMUA FILE LU (ACAK PUN DISIKAT)
          find . -name "*.java" -exec cp {} app/src/main/java/com/infinity/app/ \;
          find . -name "*.xml" -not -path "./app/*" -exec cp {} app/src/main/res/layout/ \;

          # 3. 🔥 FITUR DEWA: AUTO-REPAIR JANTUNG KODE 🔥
          cat <<EOF > app/src/main/java/com/infinity/app/MainActivity.java
          package com.infinity.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("INFINITY SYSTEM V8\nSTATUS: GACOR PARAH!");
                  tv.setGravity(Gravity.CENTER);
                  setContentView(tv);
              }
          }
          EOF

          # 4. REPARASI PACKAGE FILE LAIN (Biar Gak Bentrok)
          for file in app/src/main/java/com/infinity/app/*.java; do
            if [ "$(basename "$file")" != "MainActivity.java" ]; then
              sed -i '/package /d' "$file"
              sed -i '1i package com.infinity.app;' "$file"
            fi
          done

          # 5. NYIPTAIN MANIFEST & GRADLE KEBAL EROR
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.infinity.app">
              <application android:label="InfinityV8" android:theme="@android:style/Theme.DeviceDefault">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          echo "include ':app'" > settings.gradle
          echo '<resources><string name="app_name">InfinityV8</string></resources>' > app/src/main/res/values/strings.xml

          kucing <<EOF > app/build.gradle
          plugin { id 'com.android.application' }
          android {
              namespace 'com.infinity.app'
              compileSdk 34
              defaultConfig {
                  ID aplikasi "com.infinity.app"
                  minSdk 21
                  targetSdk 34
                  Kode versi 1
                  nama versi "1.0"
              }
          }
          Akhir dari

      - name : 🚀 Eksekusi Build APK Paksa (DEBUG MODE)
        jalankan : |
          sudo apt-get update && sudo apt-get install gradle -y
          # Pake assembleDebug biar gak ribet urusan Keystore/Sign!
          gradle assembleDebug --no-daemon --lanjutkan || gema "PAKSA CARI HASIL!"

      - nama : 📦 Kirim Hasil Akhir (SEARCH & RESCUE)
        penggunaan : actions/upload-artifact@v4
        dengan :
          nama : APK_SIAP_INSTAL_V8_FIX
          #Jalur sakti: Nyari di semua folder sampe ketemu APK
          jalur : "**/*.apk"
          jika tidak ada file yang ditemukan : kesalahan

