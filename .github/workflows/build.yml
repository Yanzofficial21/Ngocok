name: INFINITY_V16_OMNIPOTENT_FINAL
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🥷 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Setup Gradle Engine
        uses: gradle/actions/setup-gradle@v3

      - name: 🏗️ Reconstruction & Auto-Repair (BOSS MODE)
        run: |
          # RESET TOTAL
          rm -rf app build.gradle settings.gradle gradlew output_apk
          mkdir -p app/src/main/java/com/infinity/app
          mkdir -p app/src/main/res/layout app/src/main/res/values

          # PINDAHIN FILE ACAK LU
          find . -name "*.java" -not -path "./app/*" -exec cp {} app/src/main/java/com/infinity/app/ \;
          find . -name "*.xml" -not -path "./app/*" -exec cp {} app/src/main/res/layout/ \;

          # GENERATOR JANTUNG OTOMATIS
          printf "package com.infinity.app;\nimport android.app.Activity;\nimport android.os.Bundle;\npublic class MainActivity extends Activity {\nprotected void onCreate(Bundle s){super.onCreate(s);}\n}" > app/src/main/java/com/infinity/app/MainActivity.java

          # REPARASI KODE SALAH
          for file in app/src/main/java/com/infinity/app/*.java; do
            sed -i '/package /d' "$file"
            sed -i '1i package com.infinity.app;' "$file"
          done

          # SISTEM GRADLE ANTI-TRANSLATE
          echo "include ':app'" > settings.gradle
          printf "buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }\n}\nallprojects { repositories { google(); mavenCentral() } }\n" > build.gradle
          printf "apply plugin: 'com.android.application'\nandroid {\n  namespace 'com.infinity.app'\n  compileSdk 34\n  defaultConfig {\n    applicationId 'com.infinity.app'\n    minSdk 21\n    targetSdk 34\n  }\n}\n" > app/build.gradle
          printf "<manifest xmlns:android='http://schemas.android.com/apk/res/android' package='com.infinity.app'>\n<application android:label='InfinityV16'>\n<activity android:name='.MainActivity' android:exported='true'>\n<intent-filter>\n<action android:name='android.intent.action.MAIN' />\n<category android:name='android.intent.category.LAUNCHER' />\n</intent-filter>\n</activity>\n</application>\n</manifest>" > app/src/main/AndroidManifest.xml

      - name: 🚀 Build APK Paksa
        run: |
          gradle assembleDebug --no-daemon --continue

      - name: 🚚 Pindahin APK ke Folder Aman (ANTI-ZONK)
        run: |
          # Kita buat folder 'kirim' yang gak bakal bisa dicuekin robot pengirim
          mkdir -p kirim_sini
          find . -name "*.apk" -exec cp {} ./kirim_sini/ \;
          # Liat isi foldernya di log biar kita tau filenya ada
          ls -R ./kirim_sini/

      - name: 📦 Kirim APK Hasil Final (FORCE SEND)
        uses: actions/upload-artifact@v4
        with:
          name: APK_SIAP_DOWNLOAD_V16
          # Kita suruh robotnya ambil APAPUN yang ada di folder 'kirim_sini'
          path: ./kirim_sini/
          if-no-files-found: error
          retention-days: 1
