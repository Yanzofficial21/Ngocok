name: INFINITY_V10_OMNIPOTENT_FORCE
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Forced Reconstruction & Auto-Repair
        run: |
          # 1. RESET TOTAL & STRUKTUR ULANG
          rm -rf app build.gradle settings.gradle
          mkdir -p app/src/main/java/com/infinity/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 2. KUMPULIN SEMUA FILE (ACAK PUN DISIKAT)
          find . -name "*.java" -exec cp {} app/src/main/java/com/infinity/app/ \;
          find . -name "*.xml" -not -path "./app/*" -exec cp {} app/src/main/res/layout/ \;

          # 3. 🔥 FITUR DEWA: AUTO-GENERATOR (Kalo Java Kosong/Rusak) 🔥
          if [ ! -f "app/src/main/java/com/infinity/app/MainActivity.java" ] || [ ! -s "app/src/main/java/com/infinity/app/MainActivity.java" ]; then
            echo "KODE KOSONG! NYIPTAIN JANTUNG BARU..."
            cat <<EOF > app/src/main/java/com/infinity/app/MainActivity.java
            package com.infinity.app;
            import android.app.Activity;
            import android.os.Bundle;
            import android.widget.TextView;
            import android.view.Gravity;

            public class MainActivity extends Activity {
                @Override
                protected void onCreate(Bundle savedInstanceState) {
                    super.onCreate(savedInstanceState);
                    TextView tv = new TextView(this);
                    tv.setText("INFINITY V10\nSTATUS: GACOR TOTAL!");
                    tv.setGravity(Gravity.CENTER);
                    setContentView(tv);
                }
            }
          EOF
          fi

          # 4. 🔥 REPARASI SYNTAX BRUTAL 🔥
          for file in app/src/main/java/com/infinity/app/*.java; do
            sed -i '/package /d' "$file"
            sed -i '1i package com.infinity.app;' "$file"
            sed -i '/import .*R;/d' "$file"
            sed -i '2i import com.infinity.app.R;' "$file"
          done

          # 5. NYIPTAIN MANIFEST & GRADLE KEBAL EROR
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.infinity.app">
              <application android:label="InfinityV10" android:theme="@android:style/Theme.DeviceDefault">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          echo "include ':app'" > settings.gradle
          echo '<resources><string name="app_name">InfinityV10</string></resources>' > app/src/main/res/values/strings.xml

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.infinity.app'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.infinity.app"
                  minSdk 21 
                  targetSdk 34 
              }
          }
          EOF

      - name: Build APK (Debug Mode)
        run: |
          sudo apt-get update && sudo apt-get install gradle -y
          gradle assembleDebug --no-daemon --continue || echo "MENCETAK HASIL SISA..."

      - name: Send Result (Search & Rescue) 📦⚡
        uses: actions/upload-artifact@v4
        with:
          name: APK_SIAP_INSTAL_V10_FINAL
          path: "**/*.apk"
          if-no-files-found: error
