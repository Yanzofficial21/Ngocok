name: INFINITY_V16_OMNIPOTENT_FINAL
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🥷 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Reconstruction & Auto-Repair (BOSS MODE)
        run: |
          # BERSIHIN & BUAT STRUCTURE
          rm -rf app output_apk
          mkdir -p app/src/main/java/com/infinity/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # PINDAHIN FILE JAVA (kalo ada)
          find . -name "*.java" -type f -not -path "./app/*" -exec cp {} app/src/main/java/com/infinity/app/ \; 2>/dev/null || true

          # PINDAHIN FILE XML (kalo ada)
          find . -name "*.xml" -type f -not -path "./app/*" -exec cp {} app/src/main/res/layout/ \; 2>/dev/null || true

          # 🔥 BUAT MAINACTIVITY DEFAULT (kalo kosong)
          if [ ! -f "app/src/main/java/com/infinity/app/MainActivity.java" ] || [ ! -s "app/src/main/java/com/infinity/app/MainActivity.java" ]; then
            cat > app/src/main/java/com/infinity/app/MainActivity.java << 'JAVAEOF'
package com.infinity.app;
import android.app.Activity;
import android.os.Bundle;
import android.widget.TextView;
import android.view.Gravity;
public class MainActivity extends Activity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        TextView tv = new TextView(this);
        tv.setText("INFINITY V16 ACTIVE");
        tv.setGravity(Gravity.CENTER);
        setContentView(tv);
    }
}
JAVAEOF
          fi

          # 🔧 FIX PACKAGE NAME SEMUA JAVA FILE
          for file in app/src/main/java/com/infinity/app/*.java; do
            if [ -f "$file" ]; then
              sed -i '/^package /d' "$file"
              sed -i '1i package com.infinity.app;' "$file"
            fi
          done

          # 📝 BUAT GRADLE FILES
          cat > settings.gradle << 'GRADLEEOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "InfinityV16"
include ':app'
GRADLEEOF

          cat > build.gradle << 'GRADLEEOF'
plugins {
    id 'com.android.application' version '8.1.0' apply false
}
GRADLEEOF

          cat > app/build.gradle << 'APPGRADLE'
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.infinity.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.infinity.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
APPGRADLE

          # 📄 MANIFEST
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.infinity.app">

    <application
        android:allowBackup="true"
        android:label="Infinity V16"
        android:theme="@style/Theme.AppCompat.Light">
        <activity
            android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>

</manifest>
MANIFEST

          # 📄 STRINGS
          cat > app/src/main/res/values/strings.xml << 'STRINGS'
<resources>
    <string name="app_name">Infinity V16</string>
</resources>
STRINGS

          # 🎨 THEME
          cat > app/src/main/res/values/themes.xml << 'THEMES'
<resources>
    <style name="Theme.AppCompat.Light" parent="Theme.AppCompat.Light.DarkActionBar" />
</resources>
THEMES

          # 🔧 BUAT GRADLE WRAPPER
          echo "BUILD GRADLE"
          gradle wrapper --gradle-version 8.1.0
          chmod +x gradlew

      - name: 🚀 Build APK Paksa
        run: |
          # BUILD DENGAN GRADLE WRAPPER
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          # KALO GAGAL, COBA PAKE GRADLE SYSTEM
          if [ $? -ne 0 ]; then
            echo "Gradle wrapper gagal, coba pake gradle system..."
            gradle assembleDebug --no-daemon
          fi

      - name: 🚚 Pindahin APK ke Depan
        run: |
          mkdir -p output_apk
          # CARI APK DI SEMUA TEMPAT
          find . -name "*.apk" -type f -exec cp {} output_apk/ \; 2>/dev/null || true
          find app/build -name "*.apk" -type f -exec cp {} output_apk/ \; 2>/dev/null || true
          
          # LIST FILE UNTUK LOG
          echo "=== APK FOUND ==="
          ls -la output_apk/ || echo "TIDAK ADA APK"
          echo "================="

      - name: 📦 Kirim APK Hasil Final
        uses: actions/upload-artifact@v4
        with:
          name: APK_SIAP_DOWNLOAD_V16
          path: output_apk/
          if-no-files-found: warn
